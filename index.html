  function evaluateProgressCalculations() {
    let grandTotalCount = 0;
    let grandCompletedCount = 0;

    curriculumSyllabus.forEach(subject => {
      let subjectTotal = 0;
      let subjectCompleted = 0;

      subject.units.forEach((unit, unitIdx) => {
        unit.topics.forEach((_, topicIdx) => {
          grandTotalCount++;
          subjectTotal++;
          const uniqueId = `${subject.id}_u${unitIdx}_t${topicIdx}`;
          if (completedTopicsMap[uniqueId]) {
            grandCompletedCount++;
            subjectCompleted++;
          }
        });
      });

      const bar = document.getElementById(`bar-${subject.id}`);
            const percText = document.getElementById(`perc-${subject.id}`);
            if (bar && percText) {
              const subPerc = subjectTotal > 0 ? Math.round((subjectCompleted / subjectTotal) * 100) : 0;
              bar.style.width = `${subPerc}%`;
              bar.style.backgroundColor = `hsl(${subPerc * 1.2}, 85%, 55%)`;
              percText.innerText = `${subPerc}%`;
            }
    });

    const globalPerc = grandTotalCount > 0 ? Math.round((grandCompletedCount / grandTotalCount) * 100) : 0;
            const globalBar = document.getElementById('global-progress-bar');
            const turtleRunner = document.getElementById('turtle-runner');
    
            if (globalBar) {
              globalBar.style.width = `${globalPerc}%`;
              // Hue maps perfectly: 0% = 0 (Red), 50% = 60 (Yellow), 100% = 120 (Green)
              globalBar.style.backgroundColor = `hsl(${globalPerc * 1.2}, 85%, 55%)`;
            }
            if (turtleRunner) {
              turtleRunner.style.left = `${globalPerc}%`;
            }
          }

  function toggleTopicCompletion(id) {
      const el = document.getElementById(id);
      const tsEl = document.getElementById(`ts-${id}`);
      if (el) {
        if (el.checked) {
          const now = new Date();
          const dateString = now.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
          completedTopicsMap[id] = dateString;
          if (tsEl) tsEl.innerText = dateString;
        } else {
          delete completedTopicsMap[id];
          if (tsEl) tsEl.innerText = "";
        }
        evaluateProgressCalculations();
        saveCloudState();
      }
    }

    function restoreCheckboxStates() {
      Object.keys(completedTopicsMap).forEach(id => {
        const el = document.getElementById(id);
        const tsEl = document.getElementById(`ts-${id}`);
        const val = completedTopicsMap[id];
        if (el && val) {
          el.checked = true;
          if (tsEl) {
            // Backward compatibility check for old boolean values from previous saves
            tsEl.innerText = val === true ? "Completed" : val;
          }
        }
      });
    }

          const shortName = subjectShortNames[subject.id] || subject.title;
          const isActive = targetedSubjectFilter === subject.id;
          const btnClass = isActive ? 'bg-neu-box text-neu-highlight' : 'hover:bg-neu-box text-neu-text hover:text-neu-highlight';
      
          html += `<button onclick="switchSubject('${subject.id}')" class="px-5 py-2 font-medium text-xs rounded-xl transition-all ${btnClass}">${shortName}</button>`;
        });
    
        container.innerHTML = html;
      }

      function switchSubject(subjectId) {
        targetedSubjectFilter = subjectId;
        renderSubjectRoots();
        renderCurriculumStructure();
      }

      function switchTab(type) {
          targetedActiveFilter = type;
          targetedSubjectFilter = 'all'; // Reset subject filter when changing semesters
          ['sem3', 'sem1'].forEach(t => {
            const btn = document.getElementById(`tab-${t}`);
            if (btn) {
              const isSelected = (t === type);
              const bgClass = isSelected ? "bg-neu-box" : "hover:bg-neu-box";
        
              let color = "";
              if (t === 'sem1') {
                color = isSelected ? "text-red-600" : "text-red-500 hover:text-red-600";
              } else {
                color = isSelected ? "text-neu-highlight" : "text-neu-text hover:text-neu-highlight";
              }
        
              btn.className = `px-6 py-3 font-medium text-sm rounded-2xl transition-all ${bgClass} ${color}`;
            }
          });
          renderSubjectRoots();
          renderCurriculumStructure();
        }

    function updateSyncStatus(msg, isProcessing = false, isError = false) {
      const dot = document.getElementById('sync-dot');
      if (!dot) return;
    
      dot.classList.remove('bg-neu-accent', 'bg-green-400', 'bg-red-500', 'animate-pulse');
    
      if (isProcessing) {
        dot.classList.add('bg-neu-accent', 'animate-pulse');
      } else if (isError) {
        dot.classList.add('bg-red-500');
      } else {
        dot.classList.add('bg-green-400');
      }
    
      dot.title = msg;
    }

  async function saveCloudState() {
    updateSyncStatus('Syncing changes...', true);
    try {
      await USER_DOC.set({ completedTopicsMap });
      updateSyncStatus('Cloud Synced');
    } catch (e) {
      console.error("Cloud synchronization failure:", e);
      updateSyncStatus('Sync Error (Check Console)', false, true);
    }
  }

  window.addEventListener('DOMContentLoaded', async () => {
    updateSyncStatus('Loading curriculum data...', true);
    try {
      const doc = await USER_DOC.get();
      if (doc.exists) {
        completedTopicsMap = doc.data().completedTopicsMap || {};
        updateSyncStatus('Data Loaded & Synced');
      } else {
        updateSyncStatus('New Profile Ready');
      }
    } catch(e) {
          console.error("Initialization data lookup crashed:", e);
          updateSyncStatus('Offline / Connection Failed', false, true);
        }
        renderSubjectRoots();
        renderCurriculumStructure();
      });
  </script>
</body>
</html>
